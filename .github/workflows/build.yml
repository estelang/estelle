name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.x

            - run: bun install --frozen-lockfile

            - run: bun test

            - name: Build CLI
              run: |
                  mkdir -p dist
                  bun build --compile --minify --bytecode \
                    --target=bun-linux-x64 \
                    ./src/compiler/cli.ts --outfile dist/estelle-linux-x64
                  bun build --compile --minify --bytecode \
                    --target=bun-linux-arm64 \
                    ./src/compiler/cli.ts --outfile dist/estelle-linux-arm64
                  bun build --compile --minify --bytecode \
                    --target=bun-darwin-x64 \
                    ./src/compiler/cli.ts --outfile dist/estelle-darwin-x64
                  bun build --compile --minify --bytecode \
                    --target=bun-darwin-arm64 \
                    ./src/compiler/cli.ts --outfile dist/estelle-darwin-arm64
                  bun build --compile --minify --bytecode \
                    --target=bun-windows-x64 \
                    ./src/compiler/cli.ts --outfile dist/estelle-windows-x64.exe

            - uses: softprops/action-gh-release@v3
              with:
                  generate_release_notes: true
                  files: dist/*
